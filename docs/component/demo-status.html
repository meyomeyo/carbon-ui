<div class="page-section">
    <h2>3. Status Colors</h2>
    <p>CarbonUI標準のステータスカラーを適用します。</p>
    
    <button id="btn-success">Success</button>
    <button id="btn-danger">Danger</button>
    <button id="btn-warning">Warning</button>
    <button id="btn-clear" style="margin-top: 8px; width: 100%;">クリア (元の状態に戻す)</button>

    <h3 style="margin-top:24px;">📝 コード</h3>
    <pre><code>carbon.id('btn-success').tapped((w) => {
    w.state.apply('success');
    w.text('success 適用!');
});

carbon.id('btn-clear').tapped(() => {
    // 状態を剥がす
    carbon.id('btn-success').state.clear();
});</code></pre>
    <button class="btn-primary go-back" style="width:100%; margin-top:20px;"><- 戻る</button>
</div>

<script>
{

    
    const colorButtons = [
        { id: 'btn-success', color: 'success' },
        { id: 'btn-danger', color: 'danger' },
        { id: 'btn-warning', color: 'warning' }
    ];
    
    colorButtons.forEach(btn => {
        carbon.id(btn.id)?.tapped((w) => {
            w.state.apply(btn.color);
            w.text(`${btn.color} 適用!`);
        });
    });
    
    carbon.id('btn-clear')?.tapped(() => {
        colorButtons.forEach((btn) => {
            const w = carbon.id(btn.id);
            if(w) {
                w.state.clear();
                w.text(btn.id.replace('btn-', ''));
            }
        });
    });

}
</script>
