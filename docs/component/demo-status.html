<div class="page-section">
    <h2>3. Status Colors</h2>
    <p><span class="ja">CarbonUI標準のステータスカラーを適用します。</span><span class="en">Apply standard CarbonUI status colors.</span></p>
    
    <button id="btn-success">Success</button>
    <button id="btn-danger">Danger</button>
    <button id="btn-warning">Warning</button>
    <button id="btn-clear" style="margin-top: 8px; width: 100%;"><span class="ja">クリア (元の状態に戻す)</span><span class="en">Clear State</span></button>

    <h3 style="margin-top:24px;"><span class="ja">📝 コード</span><span class="en">📝 Code</span></h3>
    <pre><code>carbon.id('btn-success').tapped((w) => {
    w.state.apply('success');
    w.text('success 適用!');
});

carbon.id('btn-clear').tapped(() => {
    // 状態を剥がす
    carbon.id('btn-success').state.clear();
});</code></pre>
    <button class="btn-primary go-back" style="width:100%; margin-top:20px;"><span class="ja"><- 戻る</span><span class="en"><- Back</span></button>
</div>

<script>
{

    
    const colorButtons = [
        { id: 'btn-success', color: 'success' },
        { id: 'btn-danger', color: 'danger' },
        { id: 'btn-warning', color: 'warning' }
    ];
    
    colorButtons.forEach(btn => {
        carbon.id(btn.id)?.tapped((w) => {
            w.state.apply(btn.color);
            w.text(`${btn.color} 適用!`);
        });
    });
    
    carbon.id('btn-clear')?.tapped(() => {
        colorButtons.forEach((btn) => {
            const w = carbon.id(btn.id);
            if(w) {
                w.state.clear();
                w.text(btn.id.replace('btn-', ''));
            }
        });
    });

}
</script>
