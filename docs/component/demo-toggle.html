<div class="page-section">
    <h2>1. Toggle Visibility</h2>
    <p><span class="ja">要素の表示・非表示を切り替えます。</span><span class="en">Toggle visibility of elements.</span></p>
    
    <button id="btn-toggle"><span class="ja">トグル切り替え</span><span class="en">Toggle</span></button>
    <div id="target-box" class="box">Target Box</div>

    <h3 style="margin-top:24px;"><span class="ja">📝 コード</span><span class="en">📝 Code</span></h3>
    <pre><code>const targetBox = carbon.id('target-box');

carbon.id('btn-toggle').tapped(() => {
    targetBox.toggle(); // or .show() / .hide()
});</code></pre>
    <button class="btn-primary go-back" style="width:100%; margin-top:20px;"><span class="ja"><- 戻る</span><span class="en"><- Back</span></button>
</div>

<script>
{

        
    const targetBox = carbon.id('target-box');
    carbon.id('btn-toggle')?.tapped(() => targetBox.toggle());

}
</script>
