<div class="page-section">
    <h2>2. State & Array</h2>
    <p>複数要素(.class)の取得と状態(.state)の一括操作です。</p>
    
    <button class="state-btn">A</button>
    <button class="state-btn">B</button>
    <button class="state-btn">C</button>

    <h3 style="margin-top:24px;">📝 コード</h3>
    <pre><code>const states = ['active', 'info', 'disabled'];
let count = 0;

// .class で全要素にクリックイベントを紐付け
carbon.class('state-btn').tapped((widget) => {
    widget.state.clear(); // 既存の状態をリセット
    widget.state.apply(states[count % 3]);
    count++;
});</code></pre>
    <button class="btn-primary go-back" style="width:100%; margin-top:20px;"><- 戻る</button>
</div>

<script>
{

    
    let count = 0;
    const states = ['active', 'info', 'disabled'];
    
    carbon.class('state-btn').tapped((widget) => {
        widget.state.clear();
        widget.state.apply(states[count % 3]);
        count++;
    });

}
</script>
