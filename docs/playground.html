<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CarbonUI Playground</title>
    <link rel="stylesheet" href="carbon-style.css">
    
    <!-- Code Highlight (highlight.js) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.10.0/highlight.min.js"></script>
</head>
<body>
    <button class="lang-switch" onclick="toggleLang()">🌐 EN / JA</button>
    <header class="docs-header">
        <a href="index.html">← Homepage</a>
        <h1>CarbonUI Playground <img src="https://raw.githubusercontent.com/meyomeyo/carbon-ui/4bb0c61d1dce3ed9d1c8cc7bb5d84bfb6add8455/logo.svg" alt="Logo"></h1>
    </header>
    <!-- SPA マウント先 -->
    <div id="app"><p class="ja">ローディング中...</p><p class="en">Loading...</p></div>

    <script>
        function toggleLang() {
            const html = document.documentElement;
            const newLang = html.lang === 'ja' ? 'en' : 'ja';
            html.lang = newLang;
            localStorage.setItem('carbon_lang', newLang);
        }
        const savedLang = localStorage.getItem('carbon_lang') || (navigator.language.startsWith('ja') ? 'ja' : 'en');
        document.documentElement.lang = savedLang;
    </script>
    <script type="module">
        import carbon from 'https://cdn.jsdelivr.net/gh/meyomeyo/carbon-ui/carbon-ui.js';

        // ページ遷移後に確実にシンタックスハイライトを適用する
        const _originalGo = carbon.go.bind(carbon);
        carbon.go = async (...args) => {
            const res = await _originalGo(...args);
            if (window.hljs) hljs.highlightAll();
            return res;
        };

        // 共通関数をグローバルに定義（各コンポーネントから呼び出せるようにする）
        window.loadPage = async (pageCode) => {
            await carbon.go(pageCode);
            // 戻るボタンのバインド（どのコンポーネントにも共通）
            carbon.class('go-back').tapped(() => carbon.back());
        };
        carbon.init({
            root: '#app',
            home: 'component/home'
        });
    </script>
</body>
</html>
